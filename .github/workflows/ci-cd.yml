name: 🚀 CI/CD Pipeline - Quản Lý Thu Phí

# ============================================================
# TRIGGER: Khi nào pipeline sẽ chạy?
# ============================================================
on:
  push:
    branches:
      - main        # Chạy CI + CD khi push/merge vào nhánh main
      - develop     # Chạy CI (không deploy) khi push vào develop
  pull_request:
    branches:
      - main        # Chạy CI để kiểm tra trước khi merge
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

# Biến môi trường dùng chung
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/quanlythuphi
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ══════════════════════════════════════════════════════════
  # JOB 1: CI - KIỂM TRA CHẤT LƯỢNG CODE
  # ══════════════════════════════════════════════════════════
  ci-test:
    name: 🔍 CI - Kiểm Tra & Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🐘 Cài đặt PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: ✅ Kiểm tra cú pháp PHP (Lint)
        run: |
          echo "=== Kiểm tra cú pháp PHP Backend ==="
          find ./code/be -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true
          echo "=== Kiểm tra cú pháp PHP Frontend ==="
          find ./code/fe -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true
          echo "✅ Không có lỗi cú pháp PHP!"

      - name: 📁 Kiểm tra cấu trúc dự án
        run: |
          test -f Dockerfile         && echo "✅ Dockerfile OK"        || (echo "❌ Thiếu Dockerfile!"   && exit 1)
          test -f docker-compose.yml && echo "✅ docker-compose.yml OK" || (echo "❌ Thiếu docker-compose!" && exit 1)
          test -f code/database.sql  && echo "✅ database.sql OK"       || (echo "❌ Thiếu database.sql!" && exit 1)
          test -f code/be/index.php  && echo "✅ BE index.php OK"       || (echo "❌ Thiếu BE index.php!" && exit 1)
          test -f code/fe/index.php  && echo "✅ FE index.php OK"       || (echo "❌ Thiếu FE index.php!" && exit 1)

      - name: 🗄️ Kiểm tra Database SQL
        run: |
          FILE_SIZE=$(wc -c < code/database.sql)
          echo "Kích thước file SQL: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "❌ File database.sql có vẻ rỗng!" && exit 1
          fi
          echo "✅ File database.sql hợp lệ!"

  # ══════════════════════════════════════════════════════════
  # JOB 2: BUILD - XÂY DỰNG DOCKER IMAGE
  # ══════════════════════════════════════════════════════════
  build-docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-test
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🔧 Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Thông tin Docker Image
        run: |
          echo "✅ Image: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "✅ Image: ${{ env.DOCKER_IMAGE }}:latest"

  # ══════════════════════════════════════════════════════════
  # JOB 3: CD - TỰ ĐỘNG TRIỂN KHAI LÊN SERVER
  # ══════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy lên Production Server
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: 🔐 Deploy qua SSH vào server trquyen@utt-server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "============================================"
            echo "🚀 BẮT ĐẦU TRIỂN KHAI TỰ ĐỘNG"
            echo "Thời gian: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "Commit: ${{ github.sha }}"
            echo "Người deploy: ${{ github.actor }}"
            echo "============================================"

            # Di chuyển đến thư mục dự án trên server (~/QuanLyThuPhi)
            cd ~/QuanLyThuPhi

            # Lấy code mới nhất từ GitHub
            echo "📥 Đang pull code mới nhất..."
            git pull origin main

            # Pull Docker image mới nhất từ Docker Hub
            echo "🐳 Đang pull Docker image mới..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/quanlythuphi:latest

            # Khởi động lại container web với image mới (không restart DB)
            echo "🔄 Đang restart container web..."
            docker compose up -d --force-recreate --no-deps web

            # Đợi container khởi động
            echo "⏳ Đợi containers khởi động (10s)..."
            sleep 10

            # Kiểm tra sức khỏe ứng dụng
            echo "🏥 Kiểm tra sức khỏe ứng dụng..."
            if curl -f -s http://localhost:8080/fe/ > /dev/null; then
              echo "✅ Ứng dụng hoạt động bình thường!"
            else
              echo "❌ Ứng dụng không phản hồi! Đang rollback..."
              docker compose up -d --force-recreate
              exit 1
            fi

            # Dọn dẹp image cũ
            echo "🧹 Dọn dẹp Docker images cũ..."
            docker image prune -f

            echo "============================================"
            echo "✅ TRIỂN KHAI THÀNH CÔNG!"
            echo "🌐 URL: http://${{ secrets.SERVER_HOST }}:8080/fe/"
            echo "============================================"

      - name: 📢 Kết quả Deploy
        if: success()
        run: echo "🎉 Deploy thành công! Commit ${{ github.sha }} by ${{ github.actor }}"

      - name: ❌ Deploy Thất Bại
        if: failure()
        run: echo "💥 Deploy THẤT BẠI! Xem logs để biết chi tiết."

  # ══════════════════════════════════════════════════════════
  # JOB 4: TỔNG KẾT
  # ══════════════════════════════════════════════════════════
  notify-result:
    name: 📊 Tổng kết Pipeline
    runs-on: ubuntu-latest
    needs: [ci-test, build-docker, deploy-production]
    if: always()

    steps:
      - name: 📊 Tổng kết kết quả
        run: |
          echo "==============================="
          echo "📊 KẾT QUẢ PIPELINE"
          echo "==============================="
          echo "CI Test:      ${{ needs.ci-test.result }}"
          echo "Build Docker: ${{ needs.build-docker.result }}"
          echo "Deploy:       ${{ needs.deploy-production.result }}"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Commit:       ${{ github.sha }}"
          echo "==============================="
